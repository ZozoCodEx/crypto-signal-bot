name: Crypto Signal Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-signal-bot-data
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto-signal-bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crypto-signal-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper-trading bot
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated bot data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trades.csv signals.csv opportunities.csv market_regime.csv \
            portfolio_summary.csv portfolio_equity.png portfolio_pnl_distribution.png

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update bot data"
            git push
          fi
